<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portafolio</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>

<header>
    <h1>Elian Rivera</h1>
    <nav>
        <a href="#sobre-mi">Sobre mí</a>
        <a href="#proyectos">Proyectos</a>
        <a href="#contacto">Contacto</a>
        <a href="src/views/mascotas.html">Mascotas</a>
    </nav>
</header>

<section id="sobre-mi">
    <h2>Sobre mí</h2>
    <p id="texto">Hola, soy estudiante de desarrollo de software. Me gusta programar y aprender cosas nuevas.</p>
    <button onclick="cambiarTexto()">Cambiar texto</button>
</section>

<section id="proyectos">
    <h2>Proyectos</h2>
    <div class="proyectos">
        <div class="card">Proyecto 1</div>
        <div class="card">Proyecto 2</div>
        <div class="card">Proyecto 3</div>
    </div>
</section>

<section id="contacto">
    <h2>Contacto</h2>
    <form>
        <input type="text" placeholder="Nombre">
        <input type="email" placeholder="Correo">
        <button type="submit">Enviar</button>
    </form>

    <button onclick="toggleMensaje()">Mostrar mensaje</button>
    <p id="mensaje" class="oculto">Gracias por visitar mi portafolio 👋</p>
</section>

<script src="script.js"></script>
</body>
</html>
